<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SkillRadar{% endblock %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    :root {
      --navy:       #021A54;
      --pink:       #FF85BB;
      --pink-light: #FFCEE3;
      --offwhite:   #F5F5F5;
      --white:      #FFFFFF;
      --text-dark:  #0D0D0D;
      --text-muted: #6B7280;
      --card-shadow: 0 4px 24px rgba(2, 26, 84, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--offwhite);
      color: var(--text-dark);
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6,
    .font-heading {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--white);
      border-bottom: 1px solid rgba(2, 26, 84, 0.08);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      background: var(--navy);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .brand-logo::before {
      content: '';
      width: 18px;
      height: 18px;
      border: 2.5px solid var(--pink);
      border-radius: 50%;
      position: absolute;
    }

    .brand-logo::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--pink);
      border-radius: 50%;
      position: absolute;
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--navy);
    }

    .brand-name span {
      color: var(--pink);
    }

    /* ── Buttons ── */
    .btn-primary-custom {
      background: var(--navy);
      color: var(--white);
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary-custom:hover {
      background: #032470;
      color: var(--white);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(2, 26, 84, 0.25);
    }

    .btn-pink {
      background: var(--pink);
      color: var(--white);
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-pink:hover {
      background: #ff6aaa;
      color: var(--white);
      transform: translateY(-1px);
    }

    .btn-outline-custom {
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--navy);
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-outline-custom:hover {
      background: var(--navy);
      color: var(--white);
    }

    /* ── Cards ── */
    .card-custom {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      border: none;
      padding: 2rem;
    }

    /* ── Tags / Pills ── */
    .skill-tag {
      display: inline-block;
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      margin: 3px;
      font-family: 'DM Sans', sans-serif;
    }

    .tag-matched {
      background: #D1FAE5;
      color: #065F46;
    }

    .tag-missing {
      background: #FFE4E6;
      color: #9F1239;
    }

    .tag-extra {
      background: var(--pink-light);
      color: var(--navy);
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 0.5rem;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid rgba(2, 26, 84, 0.08);
      margin-top: 4rem;
      background: var(--white);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--offwhite); }
    ::-webkit-scrollbar-thumb {
      background: var(--pink-light);
      border-radius: 3px;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <img src="{{ url_for('static', filename='images/skillradarlogo.jpg') }}" 
            alt="SkillRadar Logo" 
            style="width: 36px; height: 36px; border-radius: 10px; object-fit: cover;">
      <span class="brand-name">Skill<span>Radar</span></span>
    </a>
  </nav>

  <!-- Page Content -->
  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="footer">
    <p>Built with 💙 by Nimisha &nbsp;·&nbsp; SkillRadar © 2026</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}

</body>
</html>
